services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: content_db
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/content_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change_me_now
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on: [postgres, redis]
    ports: ["8000:8000"]
  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/content_db
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on: [backend]
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000
    ports: ["3000:3000"]
    depends_on: [backend]
volumes:
  pgdata:
